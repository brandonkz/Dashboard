<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XTP // Mission Economics Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Archivo:wght@600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0a0c0a; --panel:#11140f; --panel2:#0d100c; --line:#23291f;
  --amber:#ffb000; --amber-dim:#7a5a13; --green:#27e08a; --red:#ff5a52; --blue:#5ab8ff;
  --txt:#d8dcce; --mut:#7f8773; --mut2:#565d4c;
  --in-bg:#0d100c; --scan:0.012; --glow:0.06;
}
html.light{
  --bg:#f3f1e8; --panel:#fffefa; --panel2:#faf8f0; --line:#e1dccc;
  --amber:#9a5e00; --amber-dim:#caa24e; --green:#0a8f55; --red:#c62f28; --blue:#1f6fb0;
  --txt:#23271d; --mut:#73776a; --mut2:#a4a796;
  --in-bg:#f3f1e6; --scan:0; --glow:0.05;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;transition:background .25s,color .25s}
body{min-height:100vh;background-image:
  repeating-linear-gradient(0deg, rgba(255,176,0,var(--scan)) 0px, rgba(255,176,0,var(--scan)) 1px, transparent 1px, transparent 3px),
  radial-gradient(120% 80% at 50% -10%, rgba(255,176,0,var(--glow)), transparent 60%);}
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px 60px}
.topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:22px}
.brand{font-family:'Archivo';font-weight:900;font-size:20px;letter-spacing:-0.5px}
.brand b{color:var(--amber)}
.brand .tag{font-weight:500;font-size:10px;color:var(--mut);letter-spacing:2px;display:block;margin-top:2px;text-transform:uppercase}
.tright{display:flex;align-items:center;gap:14px}
.clock{font-size:11px;color:var(--mut);text-align:right}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);margin-right:6px;vertical-align:middle}
.themebtn{background:var(--panel);border:1px solid var(--line);color:var(--txt);font-family:'JetBrains Mono';font-size:11px;font-weight:600;padding:8px 12px;border-radius:6px;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.themebtn:hover{border-color:var(--amber-dim);color:var(--amber)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:7px;padding:16px;position:relative}
.panel::before{content:'';position:absolute;top:0;left:14px;right:14px;height:1px;background:linear-gradient(90deg,transparent,var(--amber-dim),transparent)}
.full{grid-column:1/-1}
.ptitle{font-family:'Archivo';font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:3px}
.psub{font-size:10.5px;color:var(--mut);margin-bottom:14px;line-height:1.5}
.ctrl{margin-bottom:14px}
.crow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.clabel{font-size:11.5px;font-weight:500}
.cval{font-size:13px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums}
.chint{font-size:9.5px;color:var(--mut2);margin-top:6px;line-height:1.5}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--line);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--amber);cursor:pointer;box-shadow:0 0 0 3px rgba(255,176,0,0.18),0 0 10px rgba(255,176,0,0.4)}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:6px;overflow:hidden}
.kpi .cell{background:var(--panel2);padding:13px 12px}
.kpi .k{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.kpi .v{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;text-align:right;padding:0 7px 8px;font-weight:600;border-bottom:1px solid var(--line)}
th:first-child{text-align:left}
td{font-size:11px;padding:6px 7px;border-bottom:1px solid var(--line);text-align:right}
td:first-child{text-align:left;color:var(--txt)}
.grplabel{font-family:'Archivo';font-weight:700;font-size:10px;letter-spacing:1.5px;color:var(--blue);text-transform:uppercase;background:transparent;border:none;width:100%;padding:14px 0 6px}
.grplabel:focus{outline:none;color:var(--amber)}
.numin{width:56px;background:var(--in-bg);border:1px solid var(--line);border-radius:4px;color:var(--amber);font-family:'JetBrains Mono';font-size:11px;font-weight:600;padding:4px 5px;text-align:right}
.numin:focus{outline:none;border-color:var(--amber-dim)}
.numin.sm{width:40px}
.numin::placeholder{color:var(--mut2)}
.txtin{width:100%;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--txt);font-family:'JetBrains Mono';font-size:11px;padding:2px 0;transition:border .15s}
.txtin:hover{border-bottom-color:var(--line)}
.txtin:focus{outline:none;border-bottom-color:var(--amber)}
.badge{display:inline-block;font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.b-ok{background:rgba(39,224,138,.15);color:var(--green)}
.b-bad{background:rgba(255,90,82,.15);color:var(--red)}
.b-cost{background:rgba(127,135,115,.15);color:var(--mut)}
.del{background:none;border:none;color:var(--mut2);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;border-radius:4px;transition:all .12s}
.del:hover{color:var(--red);background:rgba(255,90,82,.1)}
.addbtn{width:100%;background:transparent;border:1px dashed var(--line);border-radius:5px;color:var(--mut);font-family:'JetBrains Mono';font-size:10.5px;font-weight:600;padding:8px;cursor:pointer;margin:6px 0 4px;letter-spacing:.5px;transition:all .15s}
.addbtn:hover{border-color:var(--amber-dim);color:var(--amber)}
.verdict{border-radius:7px;padding:16px 18px;margin-bottom:14px;border:1px solid;display:flex;align-items:center;gap:14px}
.verdict.good{border-color:rgba(39,224,138,.35);background:linear-gradient(180deg,rgba(39,224,138,.08),transparent)}
.verdict.bad{border-color:rgba(255,90,82,.4);background:linear-gradient(180deg,rgba(255,90,82,.09),transparent)}
.verdict .big{font-family:'Archivo';font-weight:900;font-size:24px;letter-spacing:-1px;line-height:1}
.verdict.good .big{color:var(--green)} .verdict.bad .big{color:var(--red)}
.verdict .sub{font-size:11px;color:var(--mut);margin-top:5px;line-height:1.5}
.verdict .icon{font-size:28px}
.miscrow{display:flex;justify-content:space-between;font-size:10.5px;padding:6px 0;border-bottom:1px solid var(--line)}
.miscrow .ml{color:var(--mut)} .miscrow .mv{font-weight:600;font-variant-numeric:tabular-nums}
.hero{font-family:'Archivo';font-weight:800;font-size:26px;font-variant-numeric:tabular-nums;letter-spacing:-1px;margin-top:4px}
.foot{font-size:9.5px;color:var(--mut2);margin-top:24px;text-align:center;line-height:1.6;border-top:1px solid var(--line);padding-top:16px}
.scards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:820px){.scards{grid-template-columns:1fr}}
.scard{border:1px solid var(--line);border-radius:6px;padding:14px;background:var(--panel2)}
.scard h4{font-family:'Archivo';font-weight:700;font-size:12.5px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.scard .sd{font-size:10px;color:var(--mut);line-height:1.55;margin-bottom:12px}
.scard .res{font-family:'Archivo';font-weight:800;font-size:21px;font-variant-numeric:tabular-nums;letter-spacing:-.5px;margin-top:10px}
.scard .rsub{font-size:10px;color:var(--mut);margin-top:3px;line-height:1.5}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef}=React;
const pct=(x,d=1)=>(x*100).toFixed(d)+'%';
const money=(x)=>(x<0?'-$':'$')+Math.abs(Math.round(x)).toLocaleString();
const money2=(x)=>(x<0?'-$':'$')+Math.abs(x).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

const SEED=[
  ['npj','Select an avatar',50,null,0],
  ['npj','Make one deposit (any value)',200,null,0],
  ['npj','Next deposit of $10+',300,null,0],
  ['npj','10 free spins on MMW',100,null,0],
  ['npj','Complete MMW spins on 3 days',100,null,0],
  ['npj','Place 100 casino bets',250,null,0],
  ['npj','Place 2 sports wagers',150,null,0],
  ['npj','Make a third deposit',300,null,0],
  ['npj','Log in 10 of 14 days',100,null,0],
  ['npj','Deposit total of $150',200,null,0],
  ['npj','Email verification',50,null,0],
  ['npj','Complete all NPJ in 14 days',500,null,0],
  ['npj','KYC verification',1000,null,0],
  ['daily','Daily: Deposit $20',600,null,4],
  ['daily','Daily: Deposit $100 (unlock)',2000,null,4],
  ['daily','Daily: Wager $100',300,100,4],
  ['daily','Daily: Wager $300 (unlock)',600,300,4],
  ['daily','Daily: Wager $1500 (unlock 2)',4000,1500,4],
  ['daily','Daily: Wager $50 new games',100,50,3],
  ['daily','Daily: $5 Sports parlay',250,5,3],
  ['daily','Daily: Wager $100 Sport (unlock)',1000,100,3],
  ['daily','Daily: Win 10x your bet',300,null,3],
  ['daily','Daily: Win 50x your bet (unlock)',3000,null,3],
  ['weekly','Weekly: Deposit total $300',3000,null,1],
  ['weekly','Weekly: Deposit total $500 (unlock)',5000,null,1],
  ['weekly','Weekly: Deposit total $800 (unlock 2)',8000,null,1],
  ['weekly','Weekly: Win 20x GAME 1',500,null,1],
  ['weekly','Weekly: Win 50x GAME 2 (unlock)',1000,null,1],
  ['weekly','Weekly: Win 100x GAME 3 (unlock 2)',3000,null,1],
  ['weekly','Weekly: 5-day login streak',100,null,1],
  ['weekly','Weekly: 7-day login streak (unlock)',200,null,1],
  ['weekly','Weekly: Complete all in 7 days',1000,null,1],
].map((r,i)=>({id:i,group:r[0],name:r[1],coins:r[2],wager:r[3],days:r[4]}));

function Slider({label,val,min,max,step,onChange,fmt,hint}){
  return(<div className="ctrl">
    <div className="crow"><span className="clabel">{label}</span><span className="cval">{fmt(val)}</span></div>
    <input type="range" min={min} max={max} step={step} value={val} onChange={e=>onChange(parseFloat(e.target.value))}/>
    {hint&&<div className="chint">{hint}</div>}
  </div>);
}

function App(){
  const DEF_GROUPS=[
    {key:'npj',label:'New Player Journey — one-time per player'},
    {key:'daily',label:'Daily Recurring'},
    {key:'weekly',label:'Weekly Recurring'},
  ];
  const SAVED=(()=>{try{const r=localStorage.getItem('xtp_console_v1');return r?JSON.parse(r):null;}catch(e){return null;}})();

  const [theme,setTheme]=useState(SAVED?.theme??'dark');
  useEffect(()=>{document.documentElement.classList.toggle('light',theme==='light');},[theme]);

  const [coinPer1000,setCoin]=useState(SAVED?.coinPer1000??10);
  const [playthrough,setPT]=useState(SAVED?.playthrough??20);
  const [rtp,setRtp]=useState(SAVED?.rtp??0.96);
  const [missions,setM]=useState(SAVED?.missions??SEED);
  const [earnerWager,setEW]=useState(SAVED?.earnerWager??6450);
  const [stressEdge,setSE]=useState(SAVED?.stressEdge??0.04);
  const [stressPT,setSPT]=useState(SAVED?.stressPT??20);
  const [nPlayers,setNP]=useState(SAVED?.nPlayers??1000);
  const [gAmt,setGA]=useState(SAVED?.gAmt??100);
  const [gWin,setGW]=useState(SAVED?.gWin??10);
  const [gPT,setGPT]=useState(SAVED?.gPT??20);
  const [gRtp,setGR]=useState(SAVED?.gRtp??0.96);
  const [gClaim,setGC]=useState(SAVED?.gClaim??1);
  const [groups,setGroups]=useState(SAVED?.groups??DEF_GROUPS);
  const nextId=useRef((SAVED?.missions??SEED).reduce((mx,m)=>Math.max(mx,(m.id||0)+1),SEED.length));

  useEffect(()=>{try{localStorage.setItem('xtp_console_v1',JSON.stringify({theme,coinPer1000,playthrough,rtp,missions,groups,earnerWager,stressEdge,stressPT,nPlayers,gAmt,gWin,gPT,gRtp,gClaim}));}catch(e){}},
    [theme,coinPer1000,playthrough,rtp,missions,groups,earnerWager,stressEdge,stressPT,nPlayers,gAmt,gWin,gPT,gRtp,gClaim]);

  const edge=1-rtp;
  const factor=Math.max(0,1-(playthrough*edge));
  const coinFace=coinPer1000/1000;
  const costPerCoin=coinFace*factor;

  const set=(id,key,v)=>setM(ms=>ms.map(m=>m.id===id?{...m,[key]:v}:m));
  const del=(id)=>setM(ms=>ms.filter(m=>m.id!==id));
  const add=(g)=>{const id=nextId.current++;setM(ms=>[...ms,{id,group:g,name:'New mission',coins:100,wager:null,days:g==='npj'?0:1}]);};
  const setGroup=(key,label)=>setGroups(gs=>gs.map(g=>g.key===key?{...g,label}:g));

  const rowsWith=(m)=>{
    const face=(+m.coins||0)*coinFace, eff=face*factor;
    const rev=(m.wager!=null&&m.wager!=='')?m.wager*edge:null;
    const net=rev!=null?rev-eff:null;
    return {face,eff,rev,net};
  };

  const npj=missions.filter(m=>m.group==='npj');
  const npjCoins=npj.reduce((s,m)=>s+(+m.coins||0),0);
  const recurring=missions.filter(m=>m.group!=='npj');
  const weeklyCoins=recurring.reduce((s,m)=>s+(+m.coins||0)*(+m.days||0),0);
  const weeklyFace=weeklyCoins*coinFace, weeklyEff=weeklyFace*factor;
  const weeklyRev=earnerWager*edge, weeklyNet=weeklyRev-weeklyEff;

  const reset=()=>{try{localStorage.removeItem('xtp_console_v1');}catch(e){}setM(SEED.map(m=>({...m})));setGroups(DEF_GROUPS.map(g=>({...g})));nextId.current=SEED.length;};

  const exportXLSX=()=>{
    const A=[
      ['XTP Mission Economics — exported '+new Date().toLocaleString()],[],
      ['ASSUMPTIONS'],
      ['Coins per $10',coinPer1000],
      ['Coin face value ($)',coinFace],
      ['Playthrough (x)',playthrough],
      ['Game RTP',rtp],
      ['House edge',edge],
      ['Effective cost factor',factor],
      ['Effective cost per coin ($)',costPerCoin],[],
      ['SUMMARY'],
      ['New player — coins (one-time)',npjCoins],
      ['New player — face value ($)',npjCoins*coinFace],
      ['New player — real cost ($)',npjCoins*costPerCoin],
      ['Heavy player — coins / week',weeklyCoins],
      ['Heavy player — real cost / week ($)',weeklyEff],
      ['Heavy player — real weekly wager ($)',earnerWager],
      ['Heavy player — gaming revenue / week ($)',weeklyRev],
      ['Heavy player — NET / week ($)',weeklyNet],
      ['Heavy player — NET / year ($)',weeklyNet*52],
    ];
    const sumWS=XLSX.utils.aoa_to_sheet(A);
    const data=[['Section','Mission','Coins','Face $','Real cost $','Required wager $','Days/wk','Revenue /done $','Net /done $','Status']];
    groups.forEach(g=>missions.filter(m=>m.group===g.key).forEach(m=>{
      const r=rowsWith(m);
      data.push([g.label,m.name,+m.coins||0,+r.face.toFixed(4),+r.eff.toFixed(4),
        (m.wager==null||m.wager==='')?'':+m.wager, m.group==='npj'?'once':(+m.days||0),
        r.rev==null?'':+r.rev.toFixed(4), r.net==null?'':+r.net.toFixed(4),
        r.net==null?'COST':(r.net>=0?'PROFIT':'LOSS')]);
    }));
    const mWS=XLSX.utils.aoa_to_sheet(data);
    mWS['!cols']=[{wch:34},{wch:32},{wch:8},{wch:9},{wch:10},{wch:14},{wch:8},{wch:13},{wch:11},{wch:9}];
    sumWS['!cols']=[{wch:38},{wch:16}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,mWS,'Missions');
    XLSX.utils.book_append_sheet(wb,sumWS,'Assumptions & Summary');
    XLSX.writeFile(wb,'XTP_Mission_Economics.xlsx');
  };

  // ---- edge-case stress computations ----
  const recCost=missions.filter(m=>m.group!=='npj'&&(m.wager==null||m.wager===''));
  const friCoins=recCost.reduce((s,m)=>s+(+m.coins||0)*(+m.days||0),0);
  const friCost=friCoins*costPerCoin;
  const winCoins=recCost.filter(m=>/win/i.test(m.name)).reduce((s,m)=>s+(+m.coins||0)*(+m.days||0),0);
  const winCost=winCoins*costPerCoin;
  const beEdge=earnerWager>0?weeklyEff/earnerWager:0;          // edge below which heavy player loses money
  const c1net=earnerWager*stressEdge-weeklyEff;                // low-edge routing
  const stressFactor=Math.max(0,1-stressPT*edge);
  const c2net=weeklyRev-weeklyFace*stressFactor;              // weak/failed playthrough
  const c2onboard=npjCoins*coinFace*stressFactor;

  // ---- X giveaway calculator ----
  const gEdge=1-gRtp;
  const gFactor=Math.max(0,1-gPT*gEdge);
  const gReqWager=gAmt*gPT;
  const gWinBack=Math.min(gAmt,gReqWager*gEdge);
  const gCostPer=gAmt*gFactor;
  const gTotalFace=gAmt*gWin;
  const gTotalCost=gCostPer*gWin*gClaim;
  const gTotalWager=gReqWager*gWin*gClaim;

  const Row=(m)=>{
    const r=rowsWith(m);
    return(<tr key={m.id}>
      <td><input className="txtin" value={m.name} onChange={e=>set(m.id,'name',e.target.value)}/></td>
      <td><input className="numin" value={m.coins} onChange={e=>set(m.id,'coins',e.target.value===''?0:parseInt(e.target.value)||0)}/></td>
      <td style={{color:'var(--mut)'}}>{money2(r.face)}</td>
      <td style={{color:'var(--amber)'}}>{money2(r.eff)}</td>
      <td><input className="numin" placeholder="—" value={m.wager==null?'':m.wager} onChange={e=>set(m.id,'wager',e.target.value===''?null:parseFloat(e.target.value)||0)}/></td>
      <td>{m.group==='npj'?<span style={{color:'var(--mut2)'}}>once</span>:<input className="numin sm" value={m.days} onChange={e=>set(m.id,'days',e.target.value===''?0:parseInt(e.target.value)||0)}/>}</td>
      <td style={{color:r.net==null?'var(--mut)':(r.net>=0?'var(--green)':'var(--red)'),fontWeight:600}}>{r.net==null?'—':money2(r.net)}</td>
      <td><span className={"badge "+(r.net==null?'b-cost':(r.net>=0?'b-ok':'b-bad'))}>{r.net==null?'COST':(r.net>=0?'PROFIT':'LOSS')}</span></td>
      <td style={{width:24}}><button className="del" title="Delete" onClick={()=>del(m.id)}>×</button></td>
    </tr>);
  };

  return(<div className="wrap">
    <div className="topbar">
      <div className="brand">XTP <b>//</b> Mission Economics<span className="tag">Retention Programme · Live Cost Model</span></div>
      <div className="tright">
        <div className="clock"><span className="dot"></span>LIVE MODEL<br/>{playthrough}× · {pct(rtp,0)} RTP</div>
        <button className="themebtn" onClick={exportXLSX}>⤓ EXCEL</button>
        <button className="themebtn" onClick={reset}>↺ RESET</button>
        <button className="themebtn" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>{theme==='dark'?'☀ LIGHT':'☾ DARK'}</button>
      </div>
    </div>

    <div className={"verdict "+(weeklyNet>=0?'good':'bad')}>
      <div className="icon">{weeklyNet>=0?'▲':'▼'}</div>
      <div>
        <div className="big">{weeklyNet>=0?'HEAVY PLAYER IS NET POSITIVE':'HEAVY PLAYER LOSES YOU MONEY'}</div>
        <div className="sub">A player completing the whole recurring schedule earns {weeklyCoins.toLocaleString()} coins ({money(weeklyFace)} face), costing {money(weeklyEff)} after playthrough, against {money(weeklyRev)} of gaming revenue from {money(earnerWager)} wagered → <b style={{color:weeklyNet>=0?'var(--green)':'var(--red)'}}>{money(weeklyNet)}/week</b>. Each new player costs {money(npjCoins*costPerCoin)} to onboard once.</div>
      </div>
    </div>

    <div className="grid">
      <div className="panel">
        <div className="ptitle">① The Basics</div>
        <div className="psub">Sets the real cost of every coin. The playthrough is your protection.</div>
        <Slider label="Coins per $10" val={coinPer1000} min={500} max={2000} step={50} onChange={setCoin} fmt={v=>v.toLocaleString()} hint={`Each coin = ${money2(coinFace)} face.`}/>
        <Slider label="Playthrough" val={playthrough} min={0} max={40} step={1} onChange={setPT} fmt={v=>v+'×'} hint="Higher = coins cost you less."/>
        <Slider label="Game RTP" val={rtp} min={0.90} max={0.995} step={0.005} onChange={setRtp} fmt={v=>pct(v)} hint={`House edge ${pct(edge)}.`}/>
        <div className="kpi" style={{marginTop:4}}>
          <div className="cell"><div className="k">Cost / coin</div><div className="v" style={{color:'var(--amber)'}}>{money2(costPerCoin)}</div></div>
          <div className="cell"><div className="k">Cost factor</div><div className="v">{pct(factor,0)}</div></div>
          <div className="cell"><div className="k">Face / coin</div><div className="v" style={{color:'var(--mut)'}}>{money2(coinFace)}</div></div>
        </div>
      </div>

      <div className="panel">
        <div className="ptitle">② New Player Cost</div>
        <div className="psub">What every fully-onboarded player costs you once.</div>
        <div className="miscrow"><span className="ml">Total coins awarded</span><span className="mv" style={{color:'var(--amber)'}}>{npjCoins.toLocaleString()}</span></div>
        <div className="miscrow"><span className="ml">Face value</span><span className="mv" style={{color:'var(--mut)'}}>{money2(npjCoins*coinFace)}</span></div>
        <div className="miscrow"><span className="ml">Real cost after playthrough</span><span className="mv" style={{color:'var(--green)'}}>{money2(npjCoins*costPerCoin)}</span></div>
        <div className="chint" style={{marginTop:10}}>Acquisition spend — paid once to convert a registration into a KYC'd, playing user.</div>
      </div>

      <div className="panel">
        <div className="ptitle">③ Heavy Player / Week</div>
        <div className="psub">A player maxing the recurring schedule. Set their real weekly turnover (after overlap).</div>
        <Slider label="Their real weekly wager" val={earnerWager} min={0} max={15000} step={250} onChange={setEW} fmt={v=>money(v)} hint="Top tier of each wager ladder, not every tier summed."/>
        <div className="miscrow"><span className="ml">Coins / week</span><span className="mv" style={{color:'var(--amber)'}}>{weeklyCoins.toLocaleString()}</span></div>
        <div className="miscrow"><span className="ml">Real cost / week</span><span className="mv">{money(weeklyEff)}</span></div>
        <div className="miscrow"><span className="ml">Gaming revenue / week</span><span className="mv" style={{color:'var(--green)'}}>{money(weeklyRev)}</span></div>
        <div className="hero" style={{color:weeklyNet>=0?'var(--green)':'var(--red)'}}>{money(weeklyNet)}<span style={{fontSize:11,color:'var(--mut)',fontWeight:500}}> net/wk · {money(weeklyNet*52)}/yr</span></div>
      </div>

      <div className="panel full">
        <div className="ptitle">④ Every Mission — fully editable</div>
        <div className="psub">Click any name or section heading to rename it. Edit coins, required wager (leave blank for none), and days/week. Use × to delete, + to add. <b style={{color:'var(--green)'}}>PROFIT</b> = wager out-earns the coins · <b style={{color:'var(--mut)'}}>COST</b> = no direct gaming revenue.</div>
        <table>
          <thead><tr><th style={{width:'34%'}}>Mission</th><th>Coins</th><th>Face $</th><th>Real cost</th><th>Req. wager</th><th>Days/wk</th><th>Net /done</th><th>Status</th><th></th></tr></thead>
          <tbody>
          {groups.map(g=>(
            <React.Fragment key={g.key}>
              <tr><td colSpan={9}><input className="grplabel" value={g.label} onChange={e=>setGroup(g.key,e.target.value)}/></td></tr>
              {missions.filter(m=>m.group===g.key).map(Row)}
              <tr><td colSpan={9} style={{borderBottom:'none',paddingTop:2}}><button className="addbtn" onClick={()=>add(g.key)}>+ Add mission to {g.label.split('—')[0].trim()}</button></td></tr>
            </React.Fragment>
          ))}
          </tbody>
        </table>
      </div>

      <div className="panel full">
        <div className="ptitle">⑤ Edge-Case Stress Tests</div>
        <div className="psub">The ways this could lose money. Push each lever and watch the verdict flip. Everything reacts to the missions and assumptions you set above.</div>
        <div className="scards">

          <div className="scard">
            <h4>Low-edge routing <span className={"badge "+(c1net>=0?'b-ok':'b-bad')}>{c1net>=0?'SAFE':'BLEEDING'}</span></h4>
            <div className="sd">The biggest risk. A player grinds wager missions on low-house-edge games (sportsbook, blackjack) instead of slots. Your coins cost the same, but you win back far less. Drag to the edge they actually play at.</div>
            <Slider label="Edge players actually wager at" val={stressEdge} min={0} max={0.08} step={0.0025} onChange={setSE} fmt={v=>pct(v)} hint={`Break-even is ${pct(beEdge)}. Below it, the heavy player turns into a loss.`}/>
            <div className="res" style={{color:c1net>=0?'var(--green)':'var(--red)'}}>{money(c1net)}<span style={{fontSize:11,color:'var(--mut)',fontWeight:500}}> /week</span></div>
            <div className="rsub">{c1net>=0?`You still keep margin. Stays safe until edge drops below ${pct(beEdge)}.`:`Underwater by ${money(-c1net)}/week (${money(-c1net*52)}/yr). Restrict wager missions to high-edge games.`}</div>
          </div>

          <div className="scard">
            <h4>Playthrough weakens <span className={"badge "+(c2net>=0?'b-ok':'b-bad')}>{c2net>=0?'SAFE':'DANGER'}</span></h4>
            <div className="sd">Your whole defence is the wagering requirement. If coins leak as near-cash (low or no playthrough), every coin costs closer to full face. Drag the requirement down to see the cliff.</div>
            <Slider label="Playthrough requirement" val={stressPT} min={0} max={40} step={1} onChange={setSPT} fmt={v=>v+'×'} hint={`Cost factor becomes ${pct(stressFactor,0)} of face. Onboarding a player would cost ${money2(c2onboard)}.`}/>
            <div className="res" style={{color:c2net>=0?'var(--green)':'var(--red)'}}>{money(c2net)}<span style={{fontSize:11,color:'var(--mut)',fontWeight:500}}> /week</span></div>
            <div className="rsub">{c2net>=0?'Heavy player still net positive at this requirement.':`At ${stressPT}× the heavy player costs you ${money(-c2net)}/week. Keep the playthrough enforced.`}</div>
          </div>

          <div className="scard">
            <h4>Free-rider farming <span className="badge b-cost">UNCOMPENSATED</span></h4>
            <div className="sd">A player who only completes the no-wager missions (deposits, logins, engagement) and never does a wager mission. They generate no direct gaming revenue — pure coin leakage. Scale it to your player base.</div>
            <Slider label="Players behaving this way" val={nPlayers} min={0} max={50000} step={500} onChange={setNP} fmt={v=>v.toLocaleString()} hint={`${friCoins.toLocaleString()} coins/week each · ${money2(friCost)} real cost each.`}/>
            <div className="res" style={{color:'var(--amber)'}}>{money(friCost*nPlayers)}<span style={{fontSize:11,color:'var(--mut)',fontWeight:500}}> /week · {money(friCost*nPlayers*52)}/yr</span></div>
            <div className="rsub">Upper bound — a true non-wagerer can't clear the WR to redeem, so much of this becomes breakage. Caps your worst-case liability.</div>
          </div>

          <div className="scard">
            <h4>Win-multiplier fishing <span className="badge b-cost">CAUTION</span></h4>
            <div className="sd">"Win Nx your bet" pays the same coins no matter the stake, so a player min-stakes to trigger it cheaply. The coins cost you, but the tiny stake generates almost no revenue.</div>
            <div className="res" style={{color:'var(--amber)'}}>{money(winCost)}<span style={{fontSize:11,color:'var(--mut)',fontWeight:500}}> /week in win-reward cost</span></div>
            <div className="rsub">{winCoins.toLocaleString()} coins/week sit in "Win" missions with no minimum stake attached. Fix: require a minimum qualifying stake so the reward tracks real wagering.</div>
          </div>

        </div>
      </div>

      <div className="panel full">
        <div className="ptitle">⑥ X / Twitter Giveaway Calculator</div>
        <div className="psub">For quick airdrops and giveaways. The headline number ("$100!") is not what it costs you — once a playthrough is attached, the winner has to wager it through and you win back the house edge. This shows your true cost per user.</div>
        <div className="scards">

          <div>
            <Slider label="Bonus per winner" val={gAmt} min={0} max={1000} step={10} onChange={setGA} fmt={v=>money(v)} hint="The amount you advertise giving each winner."/>
            <div className="ctrl">
              <div className="crow"><span className="clabel">Number of winners</span><input className="numin" value={gWin} onChange={e=>setGW(e.target.value===''?0:parseInt(e.target.value)||0)}/></div>
            </div>
            <Slider label="Playthrough requirement" val={gPT} min={0} max={40} step={1} onChange={setGPT} fmt={v=>v+'×'} hint={`Winner must wager ${money(gReqWager)} before cashing out.`}/>
            <Slider label="Game RTP" val={gRtp} min={0.90} max={0.995} step={0.005} onChange={setGR} fmt={v=>pct(v)} hint={`House edge ${pct(gEdge)} — what you win back on their wagering.`}/>
            <Slider label="% of winners who claim & play through" val={gClaim} min={0} max={1} step={0.05} onChange={setGC} fmt={v=>pct(v,0)} hint="Realistically below 100% — non-claimers and early busts cost you nothing."/>
          </div>

          <div>
            <div className="res" style={{color:'var(--amber)',fontSize:34}}>{money2(gCostPer)}<span style={{fontSize:12,color:'var(--mut)',fontWeight:500}}> real cost per winner</span></div>
            <div className="rsub" style={{marginBottom:14}}>{gFactor<=0?`At ${gPT}× and ${pct(gEdge)} edge the required wagering is expected to claw back the entire bonus — the giveaway is essentially self-funding.`:`A ${money(gAmt)} bonus advertised, but only ${pct(gFactor,0)} of face actually leaves your pocket.`}</div>
            <div className="miscrow"><span className="ml">You advertise / credit</span><span className="mv">{money2(gAmt)}</span></div>
            <div className="miscrow"><span className="ml">They must wager (× {gPT})</span><span className="mv" style={{color:'var(--blue)'}}>{money2(gReqWager)}</span></div>
            <div className="miscrow"><span className="ml">You win back ({pct(gEdge)} edge)</span><span className="mv" style={{color:'var(--green)'}}>{money2(gWinBack)}</span></div>
            <div className="miscrow"><span className="ml">= Real cost per winner</span><span className="mv" style={{color:'var(--amber)'}}>{money2(gCostPer)}</span></div>
            <div className="kpi" style={{marginTop:14}}>
              <div className="cell"><div className="k">Total advertised</div><div className="v" style={{color:'var(--mut)'}}>{money(gTotalFace)}</div></div>
              <div className="cell"><div className="k">Total real cost</div><div className="v" style={{color:'var(--amber)'}}>{money(gTotalCost)}</div></div>
              <div className="cell"><div className="k">Wagering driven</div><div className="v" style={{color:'var(--green)'}}>{money(gTotalWager)}</div></div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <div className="foot">
      XTP MISSION ECONOMICS CONSOLE · live · "real cost" = coins × {money2(coinFace)} × {pct(factor,0)} cost factor<br/>
      Edits auto-save in your browser when hosted (GitHub Pages / Vercel); in the in-chat preview, storage is blocked so they reset on refresh. Use ⤓ EXCEL to snapshot anytime, ↺ RESET to restore defaults.
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
